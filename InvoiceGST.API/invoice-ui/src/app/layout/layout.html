<mat-sidenav-container class="sidenav-container">

  <!-- Sidebar -->
  <mat-sidenav mode="side" opened class="sidenav">
    <h2 class="logo">InvoiceApp</h2>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard">Dashboard</a>
      <a mat-list-item routerLink="/invoices">Invoices</a>
      <a mat-list-item routerLink="/customers">Customers</a>
      <a mat-list-item routerLink="/payments">Payments</a>
      <a routerLink="/create-invoice" class="create-btn">Create Invoice</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>

    <!-- Top Navbar -->
    <mat-toolbar color="primary">
      <span>Invoice System</span>
      <span class="spacer"></span>
      <button mat-button>Logout</button>
    </mat-toolbar>

    <!-- Page Content -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
