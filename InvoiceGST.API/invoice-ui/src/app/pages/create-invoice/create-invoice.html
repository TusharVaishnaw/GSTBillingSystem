<!-- Items -->
<h3>Items</h3>

<div *ngFor="let item of items; let i = index" class="item-row">

  <mat-form-field appearance="outline">
    <mat-label>Product</mat-label>
    <input matInput [(ngModel)]="item.productName">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Qty</mat-label>
    <input matInput type="number" [(ngModel)]="item.quantity">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Rate</mat-label>
    <input matInput type="number" [(ngModel)]="item.rate">
  </mat-form-field>

  <button mat-icon-button color="warn" (click)="removeItem(i)">
    <mat-icon>close</mat-icon>
  </button>

</div>

<button mat-stroked-button color="primary" (click)="addItem()">
  + Add Item
</button>

<!-- 🔥 YAHAN ADD KARO -->
<h3 class="total">Total: ₹{{ getTotal() }}</h3>

<br>

<button mat-raised-button color="primary" (click)="createInvoice()">
  Create Invoice
</button>

<mat-form-field appearance="outline" class="full-width">
  <mat-label>Select Customer</mat-label>

  <mat-select [(ngModel)]="customerId">
    <mat-option *ngFor="let c of customers" [value]="c.id">
      {{ c.name }}
    </mat-option>
  </mat-select>

</mat-form-field>
